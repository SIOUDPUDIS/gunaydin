<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Güneş Senin İçin Doğuyor ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sun" class="sun"></div>
    <div id="stars-container"></div>
    <div id="clouds-container"></div>

    <div id="giris-ekrani">
        <h1 class="giris-baslik">Güneş senin için doğuyor... ✨</h1>
        <button class="buton" onclick="baslat()">Günü Karşıla</button>
    </div>

    <div id="ana-icerik">
        <div class="mesaj-kutusu">
            <h1>Günaydın! ✨</h1>
            <p>Güneşi gülüşüne sığdırdığın o anlardan biri olsun bugün de... Gece bitti, senin için yepyeni bir gün başladı. ✨</p>
        </div>

        <div class="music-player">
            <div class="album-art"></div>
            <div class="song-info">
                <p class="song-title">Ezhel - Felaket</p>
                <div id="karaoke-text">...</div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
